name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

concurrency:
  group: "cf-pages"
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          VITE_BASE_URL: /
        run: npm run build

      # Publica a chave do OpenRouter como secret de runtime do Pages, para a
      # Function /api/chat (AI Contabilista) lhe aceder via env.OPENROUTER_API_KEY.
      # A chave NUNCA vai para o cliente — só existe no servidor. continue-on-error
      # para o deploy não bloquear se o token não tiver permissão de secrets
      # (nesse caso configura-se uma vez no painel do Pages).
      - name: Configurar secret OpenRouter no Pages
        continue-on-error: true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: printf '%s' "$OPENROUTER_API_KEY" | npx wrangler@4 pages secret put OPENROUTER_API_KEY --project-name=estudo360

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # --commit-message explícito (ASCII): senão o wrangler envia a mensagem
          # do último commit, e o Cloudflare rejeita acentos/traços longos PT com
          # "Invalid commit message, it must be a valid UTF-8 string [8000111]".
          command: pages deploy dist --project-name=estudo360 --branch=main --commit-hash=${{ github.sha }} --commit-message="CI deploy ${{ github.sha }}"
