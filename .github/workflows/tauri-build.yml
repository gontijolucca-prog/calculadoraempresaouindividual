name: Release Build

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform: [windows-latest, macos-latest]

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Generate Icons
        shell: bash
        run: |
          mkdir -p src-tauri/icons
          if [ ! -f "src-tauri/app-icon.png" ]; then
            python3 -c "import struct,zlib;chunk=lambda t,d:struct.pack('>I',len(d))+(t+d)+struct.pack('>I',zlib.crc32(t+d)&0xffffffff);size=512;row=bytes([0])+bytes([120,29,29]*size);raw=row*size;data=chunk(b'IHDR',struct.pack('>IIBBBBB',size,size,8,2,0,0,0))+chunk(b'IDAT',zlib.compress(raw))+chunk(b'IEND',b'');open('src-tauri/app-icon.png','wb').write(b'\x89PNG\r\n\x1a\n'+data)"
          fi
          npx tauri icon src-tauri/app-icon.png

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build the app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: app-v__VERSION__
          releaseName: "Recofátima Simuladores v__VERSION__"
          releaseBody: "Versão portátil para Windows e Mac."
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.platform == 'windows-latest' && '--target x86_64-pc-windows-msvc' || '' }}
