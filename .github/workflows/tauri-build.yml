name: Release Build (Windows)

on:
  workflow_dispatch: # Permite correr manualmente
  push:
    branches:
      - main
      - master

jobs:
  build-tauri:
    permissions:
      contents: write
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Build the app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: app-v__VERSION__ # tauri-action automatically replaces \_\_VERSION\_\_ with the app version
          releaseName: "Recofátima Simuladores v__VERSION__"
          releaseBody: "Versão portátil para Windows da aplicação Recofátima Simuladores."
          releaseDraft: true
          prerelease: false
          args: --target x86_64-pc-windows-msvc
